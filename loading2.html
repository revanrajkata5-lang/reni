<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENI NOW</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root{--black:#060608;--accent:#e8c97a;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;}
    body{background:var(--black);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px;}

    .logo{
      font-family:'Bebas Neue',sans-serif;
      font-size:48px;letter-spacing:0.1em;color:#fff;
      opacity:0;animation:appear 0.6s 0.2s ease forwards;
    }
    .logo span{color:var(--accent);}
    .img{
      width:200px;height:auto;
      opacity:0;animation:appear 0.6s ease forwards;
      position: relative;
      
    }

    .bar-track{
      width:180px;height:1px;
      background:rgba(255,255,255,0.1);
      position:relative;overflow:hidden;
      opacity:0;animation:appear 0.6s 0.5s ease forwards;
    }
    .bar-fill{
      position:absolute;top:0;left:-100%;
      width:100%;height:100%;
      background:var(--accent);
      animation:slide 1.2s 0.7s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes slide{to{left:0;}}
    @keyframes appear{to{opacity:1;}}

    body.exit{animation:fadeOut 0.5s ease forwards;}
    @keyframes fadeOut{to{opacity:0;}}
  </style>
</head>
<body>
  <img src="reninowbg.png" alt="logo">
  <div class="logo">RENI<span>NOW</span></div>
  <div class="bar-track"><div class="bar-fill"></div></div>

  <script>
    setTimeout(()=>{
      document.body.classList.add('exit');
      setTimeout(()=>{ window.location.href='account.html'; },500);
    },2000);
  </script>
</body>
</html>
