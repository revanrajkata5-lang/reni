<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login - RENI STUDIO'S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <main>
        <header>
            <figure>
                <img src="renibg_img.png" alt="Reni Studio's logo" style="width: clamp(150px, 40vw, 300px); height: auto; max-width: 100%;">
            </figure>
            <h1>LOGIN</h1>
        </header>

        <div class="welcome-section">
            <h2>Welcome to RENI STUDIO'S</h2>
           

       <form onsubmit="login(event)" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username" required maxlength="50" pattern="[A-Za-z0-9_]+" title="Letters, numbers, and underscores only">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required minlength="8">
            </div>
            
            <button type="submit" class="login-btn">Login</button>
         
        </form>
    </main>
    <script>
// 🚫 Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

// 🚫 Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
});
</script>
</body>
<script>
function login(event) {
    event.preventDefault(); // stop page reload

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // Fake database
    let users = {
        "revanraj": {
            password: "123456789",
            email: "revanrajkata5@gmail.com",
            phone: "9849875648"
        },
        "sandeep": {
            password: "8008779906",
            email: "katasandeepraj@gmail.com",
            phone: "8008779906"
        },
        // new user1
        "ragini": {
            password: "ragini2628",
            email: "vaddhiragini@gmail.com",
            phone: "9014199343"
        },
        // new user2
        "narayana": {
            password: "narayana1234",
            email: "nvreddy@gmail.com",
            phone: "#"
        },
    };

    // Check login
    if (users[username] && users[username].password === password) {

        // Save data
        localStorage.setItem("username", username);
        localStorage.setItem("email", users[username].email);
        localStorage.setItem("phone", users[username].phone);

        // Redirect
        window.location.href = "loading1.html";

    } else {
        alert("Invalid Username or Password");
    }
}
</script>

<style>
    :root {
        --bg-primary: oklch(5% 0 0);
        --text-primary: oklch(95% 0 0);
        --accent: oklch(60% 0.2 240);
        --neutral: oklch(20% 0 0);
        --error: oklch(60% 0.25 15);
    }

   body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 5vw, 2rem);

    /* SAME BACKGROUND AS FIRST PAGE */
    background: radial-gradient(circle at 20% 20%, oklch(30% 0.2 240 / 0.2), transparent 40%),
                radial-gradient(circle at 80% 80%, oklch(50% 0.2 120 / 0.2), transparent 40%),
                #020b12;

    animation: bgMove 10s infinite alternate ease-in-out;
}

@keyframes bgMove {
    0% { background-position: 0% 0%, 100% 100%; }
    100% { background-position: 10% 10%, 90% 90%; }
}

 main {
    backdrop-filter: blur(12px);
    background: oklch(10% 0 0 / 0.4);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 8px 40px oklch(0% 0 0 / 0.4);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

    header {
        text-align: center;
    }

  figure {
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

    img {
        border-radius: 12px;
        box-shadow: 0 8px 32px oklch(0% 0 0 / 0.2);
    }

   h1 {
    letter-spacing: 2px;
    background: linear-gradient(90deg, white, oklch(70% 0.2 240));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

    .login-form {
        display: flex;
        flex-direction: column;
        gap: clamp(0.75rem, 3vh, 1.5rem);
        width: 100%;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    label {
        font-weight: 600;
        color: var(--text-primary);
    }

    input {
        padding: 0.75rem;
        border: 1px solid var(--neutral);
        border-radius: 8px;
        font-size: 1rem;
        background-color: oklch(10% 0 0);
        color: var(--text-primary);
        transition: border-color 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px oklch(60% 0.2 240 / 0.2);
    }

    input:invalid:not(:placeholder-shown) {
        border-color: var(--error);
    }
    input:hover {
    border-color: var(--accent);
}

  .login-btn {
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.login-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    opacity: 0;
    transition: opacity 0.4s;
}

.login-btn:hover::after {
    opacity: 1;
    animation: shine 1s;
}

@keyframes shine {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
}
</style>

</html>
