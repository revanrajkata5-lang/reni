<!DOCTYPE html>
<html lang="en">

<head>
    <title>RENI STUDIO'S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <main>
        <header>
            <h1>WELCOME TO</h1>
        </header>

        <figure>
            <img src="bg_main.png"
                 alt="Reni Studio's logo featuring a stylized main image" 
                 style="width: clamp(200px, 50vw, 400px); height: auto; max-width: 100%;">
        </figure>

        <nav>
            <a href="loading.html" class="enter-btn">ENTER</a>
        </nav>
    </main>
</body>

<style>
    :root {
        --bg-primary: oklch(5% 0 0);
        --text-primary: oklch(95% 0 0);
        --accent: oklch(60% 0.2 240);
        --neutral: oklch(20% 0 0);
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: clamp(1rem, 5vw, 2rem);
    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1rem, 5vh, 2rem);
        max-width: 800px;
        width: 100%;
    }

    h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2rem, 8vw, 4rem);
        font-weight: 700;
        margin: 0;
        color: var(--text-primary);
        text-shadow: 0 2px 4px oklch(0% 0 0 / 0.3);
    }

    figure {
        margin: 0;
    }

    img {
        border-radius: 12px;
        box-shadow: 0 8px 32px oklch(0% 0 0 / 0.2);
    }

    .enter-btn {
        display: inline-block;
        padding: clamp(0.75rem, 3vw, 1.5rem) clamp(1.5rem, 6vw, 3rem);
        font-size: clamp(1rem, 4vw, 1.25rem);
        font-weight: 600;
        color: var(--bg-primary);
        background-color: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease-out-quart;
        box-shadow: 0 4px 16px oklch(60% 0.2 240 / 0.3);
    }

    .enter-btn:hover, .enter-btn:focus {
        background-color: oklch(70% 0.25 240);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px oklch(60% 0.2 240 / 0.4);
    }

    .enter-btn:focus {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
        .enter-btn {
            transition: none;
        }
        .enter-btn:hover {
            transform: none;
        }
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-primary: oklch(10% 0 0);
            --text-primary: oklch(90% 0 0);
        }
    }
</style>

</html>
