<!DOCTYPE html>
<html lang="en">

<head>
    <title>RENI STUDIO'S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <main>
        <header>
            <h1>WELCOME TO</h1>
        </header>

        <figure>
            <img src="renibg_img.png"
                 alt="Reni Studio's logo featuring a stylized main image" 
                 style="width: clamp(200px, 50vw, 400px); height: auto; max-width: 100%;">
        </figure>
        
            <a href="loading.html" class="enter-btn">ENTER</a>
        
    </main>
    <script>
// 🚫 Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

// 🚫 Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
});
</script>
</body>

<style>
    :root {
        --bg-primary: oklch(61.065% 0.24313 28.567);
        --text-primary: oklch(95% 0 0);
        --accent: oklch(60% 0.2 240);
        --neutral: oklch(20% 0 0);
    }

 body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    background: radial-gradient(circle at 20% 20%, oklch(30% 0.2 240 / 0.2), transparent 40%),
                radial-gradient(circle at 80% 80%, oklch(50% 0.2 120 / 0.2), transparent 40%),
                #020b12;

    animation: bgMove 10s infinite alternate ease-in-out;
}
.enter-btn {
    display: inline-block;
    margin-top: 20px;

    padding: clamp(0.75rem, 3vw, 1.5rem) clamp(1.5rem, 6vw, 3rem);
    font-size: clamp(1rem, 4vw, 1.25rem);
    font-weight: 600;

    color: black;
    background: var(--accent);
    border-radius: 10px;
    text-decoration: none;

    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px oklch(60% 0.2 240 / 0.3);

    position: relative;
    overflow: hidden;
}


@keyframes bgMove {
    0% { background-position: 0% 0%, 100% 100%; }
    100% { background-position: 10% 10%, 90% 90%; }
}

    main {
    animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

  h1 {
    letter-spacing: 2px;
    background: linear-gradient(90deg, white, oklch(70% 0.2 240));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

 figure {
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

   img {
    transition: all 0.4s ease;
}

img:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 40px oklch(60% 0.2 240 / 0.4);
}

   .enter-btn {
    position: relative;
    overflow: hidden;
}

/* Glow pulse */
.enter-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    opacity: 0;
    transition: opacity 0.4s;
}

.enter-btn:hover::after {
    opacity: 1;
    animation: shine 1s;
}

@keyframes shine {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
}
</style>

</html>
