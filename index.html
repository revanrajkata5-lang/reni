<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENI NOW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#060608; --accent:#e8c97a; --text:#f0f0f2;
      --font-display:'Bebas Neue',sans-serif; --font-body:'DM Sans',sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;}
    body{
      font-family:var(--font-body);
      background:var(--black);
      color:var(--text);
      display:flex;align-items:center;justify-content:center;
      -webkit-font-smoothing:antialiased;
    }

    /* Noise grain overlay */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.04;pointer-events:none;z-index:0;
    }

    /* Radial glow */
    .glow{
      position:fixed;
      width:700px;height:700px;
      background:radial-gradient(circle,rgba(232,201,122,0.08) 0%,transparent 70%);
      top:50%;left:50%;transform:translate(-50%,-50%);
      pointer-events:none;z-index:0;
      animation:breathe 6s ease-in-out infinite;
    }
    @keyframes breathe{
      0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1);}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}
    }

    .scene{
      position:relative;z-index:1;
      text-align:center;
      animation:fadeUp 1s ease forwards;
      opacity:0;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(24px);}
      to{opacity:1;transform:translateY(0);}
    }
    .img{
      width:clamp(200px,50vw,400px);
      height:auto;
      max-width:100%;
      position: relative;
        display: above;
        align-items: center;
    }
    .scene img{
  display:block;
  margin: 0 auto 20px auto;
}
    .wordmark{
      font-family:var(--font-display);
      font-size:clamp(72px,15vw,140px);
      letter-spacing:0.06em;
      line-height:0.9;
      color:var(--text);
      position:relative;
      display:inline-block;
    }
    .wordmark span{color:var(--accent);}

    .tagline{
      font-size:clamp(11px,1.5vw,13px);
      letter-spacing:0.4em;
      text-transform:uppercase;
      color:rgba(240,240,242,0.35);
      margin-top:16px;
      font-weight:300;
    }

    .divider{
      width:40px;height:1px;
      background:var(--accent);
      margin:28px auto;
      opacity:0.6;
    }

    /* Fade out on redirect */
    body.exit{animation:fadeOut 0.7s ease forwards;}
    @keyframes fadeOut{to{opacity:0;}}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="scene">
    <img src="reninowbg.png" alt="logo">
    <div class="wordmark">RENI<span>NOW</span></div>
    <div class="divider"></div>
    <div class="tagline">Your world. Your screen.</div>
  </div>

  <script>
    setTimeout(()=>{
      document.body.classList.add('exit');
      setTimeout(()=>{ window.location.href='loading.html'; },700);
    },1800);
  </script>
  <script>
//  Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

//  Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
});
</script>

</body>
</html>
