<!DOCTYPE html>
<html>
<head>
    <title>User Info</title>
</head>
<body>

<h2>User Details</h2>

<p><b>Username:</b> <span id="user"></span></p>
<p><b>Password:</b> <span id="pass"></span></p>

<script>
document.getElementById("user").innerText = localStorage.getItem("username");
document.getElementById("pass").innerText = localStorage.getItem("password");
</script>

</body>
</html>
