<!DOCTYPE html>
<html lang="en">

<head>
    <title>Main Interface - RENI STUDIO'S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-primary: oklch(5% 0 0);
            --bg-secondary: oklch(95% 0 0);
            --text-primary: oklch(10% 0 0);
            --text-secondary: oklch(90% 0 0);
            --accent: oklch(60% 0.2 240);
            --neutral: oklch(80% 0.05 0);
            --hover: oklch(70% 0.1 240);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: rgb(168, 213, 230);
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Header */
        header {
            display: flex;
            align-items: right;
            justify-content: space-between;
            padding: clamp(0.5rem, 2vw, 1rem);
            background-color: var(--bg-secondary);
            box-shadow: 0 2px 8px oklch(0% 0 0 / 0.1);
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: clamp(0.5rem, 2vw, 1rem);
        }

        header img {
            height: clamp(40px, 8vw, 50px);
            width: auto;
            max-width: 120px;
            border-radius: 12px;
        }

        .search-form {
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 400px;
        }

        .search-form input {
            flex: 1;
            height: clamp(32px, 5vw, 40px);
            padding: 0.5rem 1rem;
            border: 1px solid var(--neutral);
            border-radius: 20px 0 0 20px;
            outline: none;
            font-size: 1rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .search-form input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px oklch(60% 0.2 240 / 0.2);
        }

        .search-form button {
            height: clamp(32px, 5vw, 40px);
            width: clamp(48px, 8vw, 60px);
            border: 1px solid var(--neutral);
            border-left: none;
            background-color: var(--bg-secondary);
            cursor: pointer;
            border-radius: 0 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .search-form button:hover, .search-form button:focus {
            background-color: whitesmoke;
        }

        .search-form button:focus {
            outline: 2px solid whitesmoke;
            outline-offset: 2px;
        }

        .right-section {
            display: flex;
            align-items: right;
            gap: clamp(0.5rem, 2vw, 1rem);

        }

        .account-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(36px, 6vw, 44px);
            height: clamp(36px, 6vw, 44px);
            border-radius: 50%;
            background-color: var(--neutral);
            color: var(--text-secondary);
            font-size: clamp(1rem, 3vw, 1.2rem);
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .account-link:hover, .account-link:focus {
            background-color: var(--hover);
        }

        .account-link:focus {
            outline: 2px solid var(--accent);
            outline-offset: 6px;
        }
        .message-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(36px, 6vw, 44px);
            height: clamp(36px, 6vw, 44px);
            border-radius: 50%;
            background-color: var(--neutral);
            color: var(--text-secondary);
            font-size: clamp(1rem, 3vw, 1.2rem);
            text-decoration: none;
            transition: background-color 0.3s ease;
            margin-left: clamp(0.5rem, 2vw, 1rem);
        }

        .message-link:hover, .message-link:focus {
            background-color: var(--hover);
        }

        .message-link:focus {
            outline: 2px solid var(--accent);
            outline-offset: 6px;
        }
        .support-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(36px, 6vw, 44px);
            height: clamp(36px, 6vw, 44px);
            border-radius: 50%;
            background-color: var(--neutral);
            color: var(--text-secondary);
            font-size: clamp(1rem, 3vw, 1.2rem);
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .support-link:hover, .support-link:focus {
            background-color: var(--hover);
        }

        .support-link:focus {
            outline: 2px solid var(--accent);
            outline-offset: 6px;
        }

        
        /* Main content */
        main {
            padding: clamp(1rem, 5vw, 2rem);
        }

        .box-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(clamp(200px, 20vw, 250px), 1fr));
            gap: clamp(1rem, 3vw, 1.5rem);
            max-width: 1200px;
            margin: 0 auto;
        }

        .box {
            background-color: var(--bg-secondary);
            min-height: clamp(100px, 15vh, 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease-out-quart;
            box-shadow: 0 4px 12px oklch(0% 0 0 / 0.1);
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .box:hover, .box:focus {
            background-color: var(--hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px oklch(0% 0 0 / 0.15);
        }

        .box:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }

            .left-section {
                width: 100%;
            }

            .search-form {
                max-width: none;
            }

            .box-container {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .box, .account-link, .search-form button {
                transition: none;
            }
            .box:hover, .account-link:hover {
                transform: none;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: oklch(10% 0 0);
                --bg-secondary: oklch(20% 0 0);
                --text-primary: oklch(90% 0 0);
                --text-secondary: oklch(95% 0 0);
            }
        }

        /* RTL support */
        [dir="rtl"] .left-section {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .search-form input {
            border-radius: 0 20px 20px 0;
        }

        [dir="rtl"] .search-form button {
            border-radius: 20px 0 0 20px;
            border-left: 1px solid var(--neutral);
            border-right: none;
        }
    </style>
     <script>
        if (!localStorage.getItem("username")) {
            window.location.href = "login.html";
        }
    </script>
</head>

<body>
    <header>
        <div class="left-section">
            <img src="renibg_img.png" alt="Reni Studio's logo">

            <form class="search-form" role="search">
                <label for="search-input" class="sr-only"></label>
                <input type="text" id="search-input" name="q" placeholder="Search" maxlength="300">
                <button type="submit" aria-label="Search">🔍</button>
            </form>
        </div>

        <div class="right-section">
            
              <a href="loading2.html" class="message-link" aria-label="Messages">💬</a>
                 <a href="loading2.html" class="account-link" aria-label="Account settings">👤</a>
                  <a href="loading2.html" class="support-link" aria-label="Support">❓</a>
        </div>
      
    </header>

    <main>
       <nav class="box-container" id="boxContainer">
    <a href="#" class="box">ACTORS 🎬</a>
    <a href="#" class="box">TRAVEL VLOGGERS ✈️</a>
    <a href="#" class="box">FOOD VIDEOS 🍚</a>
    <a href="#" class="box">ENTERTAINMENT 🤣</a>
    <a href="#" class="box">MOTIVATION VIDEOS 💪🏻</a>
    <a href="#" class="box">TECH VIDEOS 🧑🏻‍💻</a>
    <a href="#" class="box">GAMING 🎮</a>
    <a href="#" class="box">EDUCATION 📚</a>
    <a href="#" class="box">AGRICULTURE 👨‍🌾</a>
    <a href="#" class="box">SPORTS 🚵‍♀️</a>
    <a href="#" class="box">NEWS 🗞️</a>
    <a href="#" class="box">ANIMALS 🦁</a>
    <a href="#" class="box">FASHION 👕</a>
    <a href="#" class="box">BEAUTY 💄</a>
    <a href="#" class="box">OTHERS</a>
</nav>
    </main>
    <script>
const searchForm = document.querySelector(".search-form");
const searchInput = document.getElementById("search-input");
const boxes = document.querySelectorAll(".box");

searchForm.addEventListener("submit", function(e) {
    e.preventDefault(); // stop page reload

    const value = searchInput.value.toLowerCase();

    boxes.forEach(box => {
        const text = box.textContent.toLowerCase();

        if (text.includes(value)) {
            box.style.display = "flex";
        } else {
            box.style.display = "none";
        }
    });
});
</script>
<script>
    const searchInput = document.getElementById("search-input");
    const boxes = document.querySelectorAll(".box");

    searchInput.addEventListener("keyup", function() {
        const value = searchInput.value.toLowerCase();

        boxes.forEach(box => {
            const text = box.textContent.toLowerCase();
            box.style.display = text.includes(value) ? "flex" : "none";
        });
    });
    </script>
</body>

</html>
