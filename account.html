<!DOCTYPE html>
<html lang="en">
<head>
    <title>Account Info - RENI NOW</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      /* Layout reset */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0b0f;
    color: white;
}

/* 🔝 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: black;
}

.logo {
    color: #00c6ff;
    font-weight: bold;
    font-size: 1.5rem;
}

.nav-right {
    cursor: pointer;
}

/* 🎬 Profile Section */
.profile-section {
    display: flex;
    gap: 50px;
    padding: 80px 60px;
    align-items: center;
}

/* 👤 Avatar */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 10px;
    overflow: hidden;
    background: #222;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📸 Upload */
.upload-btn {
    display: inline-block;
    margin-top: 10px;
    background: #00c6ff;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

/* 📝 Profile info */
.profile-right h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.profile-right p {
    margin: 8px 0;
    color: #ccc;
}

/* 🔘 Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #00c6ff;
    border: none;
    color: white;
    cursor: pointer;
}

/* 🎞️ Rows */
.row {
    padding: 20px 60px;
}

.row-posters {
    display: flex;
    gap: 10px;
}

.poster {
    width: 150px;
    height: 200px;
    background: #222;
    border-radius: 5px;
    transition: 0.3s;
}

.poster:hover {
    transform: scale(1.1);
}

    </style>
</head>

<body>

<!-- 🔝 Navbar -->
<div class="navbar">
    <div class="logo">RENI NOW</div>
    <div class="nav-right" onclick="goHome()">Home</div>
</div>

<!-- 🎬 Profile Section -->
<div class="profile-section">

    <div class="profile-left">
        <div class="avatar">
            <img id="profileImg" src="">
        </div>

        <label for="upload" class="upload-btn">Change Photo</label>
        <input type="file" id="upload" hidden>
    </div>

    <div class="profile-right">
        <h1 id="username"></h1>

        <p><b>Email:</b> <span id="email"></span></p>
        <p><b>Phone:</b> <span id="phone"></span></p>

        <button onclick="logout()">Logout</button>
    </div>

</div>

<!-- 🎞️ Extra Section (Netflix feel) -->
<div class="row">
    <h2>Your Activity</h2>
    <div class="row-posters">
        <div class="poster"></div>
        <div class="poster"></div>
        <div class="poster"></div>
    </div>
</div>


<script>
    // Load user data
    document.getElementById("username").innerText = localStorage.getItem("username") || "Not set";
    document.getElementById("email").innerText = localStorage.getItem("email") || "Not set";
    document.getElementById("phone").innerText = localStorage.getItem("phone") || "Not set";

    const profileImg = document.getElementById("profileImg");

    // ✅ Default image if none saved
    let savedImage = localStorage.getItem("profileImage");
    if (savedImage) {
        profileImg.src = savedImage;
    } else {
        profileImg.src = "https://via.placeholder.com/90"; // default avatar
    }

    // ✅ Upload image + resize (important fix)
    document.getElementById("upload").addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
            const reader = new FileReader();

            reader.onload = function (e) {
                const img = new Image();
                img.src = e.target.result;

                img.onload = function () {
                    // Resize image (prevents storage issues)
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const size = 150; // max size
                    canvas.width = size;
                    canvas.height = size;

                    ctx.drawImage(img, 0, 0, size, size);

                    const compressed = canvas.toDataURL("image/jpeg", 0.7);

                    profileImg.src = compressed;
                    localStorage.setItem("profileImage", compressed);
                };
            };

            reader.readAsDataURL(file);
        }
    });

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
    function goHome() {
    window.location.href = "main.html"; // change to your main page file
}
</script>
<script>
// 🚫 Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

//  Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
});
</script>

</body>
</html>
