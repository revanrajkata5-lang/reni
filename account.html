<!DOCTYPE html>
<html lang="en">
<head>
    <title>Account Info - RENI STUDIO'S</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --accent: #00c6ff;
            --hover: #00a6d6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: rgb(190, 204, 118);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white;
            
        }

        .profile-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            padding: 6px 12px;
            background: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        h1 {
            margin-top: 10px;
        }

        .info {
            margin-top: 20px;
            text-align: left;
        }

        .info p {
            background: black;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: var(--hover);
        }
        .card {
    position: relative; /* IMPORTANT for positioning */
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    cursor: pointer;
    color: black;
    background: transparent;
}

.close-btn:hover {
    color: var(--accent);
}
    </style>
</head>
<header>
    <div class="wrong">
    <div class="close-btn" href="main.html">
        <div class="close-btn" onclick="goHome()">✖</div>
    </div>
</header>

<body>

<div class="card">

    <div class="profile-icon">
        <div class="avatar">
            
            <img id="profileImg" src="" alt="Profile">
        </div>

        <label for="upload" class="upload-btn">Change Photo</label>
        <input type="file" id="upload" accept="image/*" hidden>
    </div>

    <h1>Welcome 👋</h1>

    <div class="info">
        <p><b>Username:</b> <span id="username"></span></p>
        <p><b>Email:</b> <span id="email"></span></p>
        <p><b>Phone:</b> <span id="phone"></span></p>
    </div>

    <button onclick="logout()">Logout</button>

</div>

<script>
    // Load user data
    document.getElementById("username").innerText = localStorage.getItem("username") || "Not set";
    document.getElementById("email").innerText = localStorage.getItem("email") || "Not set";
    document.getElementById("phone").innerText = localStorage.getItem("phone") || "Not set";

    const profileImg = document.getElementById("profileImg");

    // ✅ Default image if none saved
    let savedImage = localStorage.getItem("profileImage");
    if (savedImage) {
        profileImg.src = savedImage;
    } else {
        profileImg.src = "https://via.placeholder.com/90"; // default avatar
    }

    // ✅ Upload image + resize (important fix)
    document.getElementById("upload").addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
            const reader = new FileReader();

            reader.onload = function (e) {
                const img = new Image();
                img.src = e.target.result;

                img.onload = function () {
                    // Resize image (prevents storage issues)
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const size = 150; // max size
                    canvas.width = size;
                    canvas.height = size;

                    ctx.drawImage(img, 0, 0, size, size);

                    const compressed = canvas.toDataURL("image/jpeg", 0.7);

                    profileImg.src = compressed;
                    localStorage.setItem("profileImage", compressed);
                };
            };

            reader.readAsDataURL(file);
        }
    });

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
    function goHome() {
    window.location.href = "main.html"; // change to your main page file
}
</script>
<script>
// 🚫 Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

// 🚫 Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
});
</script>

</body>
</html>
