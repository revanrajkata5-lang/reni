<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — RENI NOW</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --black:#060608;--surface:#0f0f12;--surface-2:#17171c;--surface-3:#1f1f26;
      --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.14);
      --text:#f0f0f2;--text-muted:#7a7a8c;
      --accent:#e8c97a;--accent-dim:rgba(232,201,122,0.1);
      --red:#e84b4b;
      --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;
      --nav-h:60px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-body);background:var(--black);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

    nav{
      position:fixed;top:0;left:0;right:0;height:var(--nav-h);
      display:flex;align-items:center;justify-content:space-between;padding:0 24px;
      background:rgba(6,6,8,0.92);border-bottom:1px solid var(--border);
      backdrop-filter:blur(16px);z-index:100;
    }
    .nav-left{display:flex;align-items:center;gap:14px;}
    .back-btn{
      width:36px;height:36px;border-radius:7px;
      background:var(--surface-2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      color:var(--text-muted);text-decoration:none;
      transition:color 0.2s,border-color 0.2s;
    }
    .back-btn:hover{color:var(--text);border-color:var(--border-hover);}
    .wordmark{font-family:var(--font-display);font-size:22px;letter-spacing:0.08em;text-decoration:none;color:var(--text);}
    .wordmark span{color:var(--accent);}

    .content{
      margin-top:calc(var(--nav-h) + 48px);
      padding:0 clamp(24px,5vw,64px) 80px;
      max-width:900px;
    }

    /* Profile hero */
    .profile-hero{
      display:flex;align-items:flex-end;gap:32px;
      margin-bottom:48px;padding-bottom:32px;
      border-bottom:1px solid var(--border);
    }

    .avatar-wrap{position:relative;flex-shrink:0;}
    .avatar{
      width:110px;height:110px;border-radius:14px;
      background:var(--surface-3);overflow:hidden;
      border:2px solid var(--border);
    }
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .avatar-edit{
      position:absolute;bottom:-8px;right:-8px;
      width:30px;height:30px;border-radius:6px;
      background:var(--accent);border:2px solid var(--black);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:#000;
    }

    .profile-info{flex:1;}
    .profile-name{
      font-family:var(--font-display);
      font-size:clamp(32px,6vw,52px);
      letter-spacing:0.04em;line-height:1;margin-bottom:10px;
    }
    .profile-badge{
      display:inline-block;padding:3px 10px;border-radius:4px;
      background:var(--accent-dim);border:1px solid rgba(232,201,122,0.25);
      color:var(--accent);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
      font-weight:600;margin-bottom:12px;
    }
    .profile-details{display:flex;gap:24px;flex-wrap:wrap;}
    .profile-detail{
      display:flex;align-items:center;gap:8px;
      font-size:13px;color:var(--text-muted);
    }
    .profile-detail svg{color:var(--text-dim);}

    /* Actions row */
    .actions-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
    .btn-ghost{
      display:inline-flex;align-items:center;gap:7px;
      padding:9px 18px;background:var(--surface-2);color:var(--text-muted);
      border:1px solid var(--border);border-radius:7px;font-size:13px;
      cursor:pointer;transition:border-color 0.2s,color 0.2s;
    }
    .btn-ghost:hover{border-color:var(--border-hover);color:var(--text);}
    .btn-danger{
      display:inline-flex;align-items:center;gap:7px;
      padding:9px 18px;background:rgba(232,75,75,0.08);color:var(--red);
      border:1px solid rgba(232,75,75,0.2);border-radius:7px;font-size:13px;
      cursor:pointer;transition:background 0.2s;
    }
    .btn-danger:hover{background:#FFCB74);
    cursor: pointer;transition:background 0.2s;
       colour: #ffcb74;}
    

    /* Info grid */
    .section-title{
      font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--text-muted);margin-bottom:16px;font-weight:600;
      display:flex;align-items:center;gap:12px;
    }
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    .info-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px;margin-bottom:48px;
    }
    .info-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;padding:16px 20px;
    }
    .info-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;font-weight:600;}
    .info-value{font-size:14px;font-weight:500;color:var(--text);}

    /* Activity placeholders */
    .activity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
    .activity-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;height:100px;
      background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);
      position:relative;overflow:hidden;
    }
    .activity-card::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.02),transparent);
      animation:shimmer 2s infinite;
    }
    @keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}

    /* Loader Styles */
    .loader-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#060608,#1a1a2e);
      display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;
      pointer-events:none;transition:opacity 0.3s ease;
    }
    .loader-overlay.active{opacity:1;pointer-events:all;}
    .loader-container{
      background:linear-gradient(135deg,rgba(232,201,122,0.1),rgba(74,144,226,0.1));
      border:2px solid rgba(232,201,122,0.3);border-radius:20px;padding:60px 80px;
    }
    .loader{
      display:flex;gap:12px;--ANIMATION-DELAY-MULTIPLIER:70ms;
    }
    .letter{
      display:inline-flex;align-items:center;justify-content:center;color:#e8c97a;
      animation:hideAndSeek 0.8s ease-in-out infinite;
    }
    .letter.l{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 0);}
    .letter.o{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 1);}
    .letter.a{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 2);}
    .letter.d{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 3);}
    .letter.i{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 4);}
    .letter.n{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 5);}
    .letter.g{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 6);}
    @keyframes hideAndSeek{
      0%,100%{transform:translateY(2rem);}
      50%{transform:translateY(-0.5rem);}
    }

    input[type=file]{display:none;}

    @media(max-width:600px){
      .profile-hero{flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>
<body>

<!-- LOADER OVERLAY -->
<div id="loaderOverlay" class="loader-overlay">
  <div class="loader-container">
    <div class="loader">
      <span class="letter l">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <line x1="10" y1="5" x2="10" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <line x1="10" y1="55" x2="25" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="letter o">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <circle cx="20" cy="30" r="15" stroke="currentColor" stroke-width="3"/>
        </svg>
      </span>
      <span class="letter a">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <path d="M 25 50 Q 20 30 15 25 Q 10 20 5 25 L 5 50" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="8" y1="35" x2="22" y2="35" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="letter d">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <line x1="25" y1="5" x2="25" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M 25 10 Q 10 10 10 30 Q 10 50 25 50" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="letter i">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <circle cx="20" cy="12" r="2.5" fill="currentColor"/>
          <line x1="20" y1="20" x2="20" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="letter n">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <line x1="10" y1="50" x2="10" y2="20" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M 10 25 Q 10 15 20 15 Q 30 15 30 25 L 30 50" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="letter g">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <path d="M 25 15 Q 10 15 10 30 Q 10 45 25 45 L 25 50 Q 10 50 8 60" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </div>
</div>

<nav>
  <div class="nav-left">
   
    <a href="main.html" class="back-btn">
        
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
     <img src="reninowbg.png" alt="logo" style="width:30px;position: relative;">
    <a class="wordmark" href="main.html">RENI<span>NOW</span></a>
  </div>
</nav>

<div class="content">

  <!-- Profile hero -->
  <div class="profile-hero">
    <div class="avatar-wrap">
      <div class="avatar">
        <img id="profileImg" src="https://ui-avatars.com/api/?background=1f1f26&color=7a7a8c&size=110&name=U&bold=true" alt="Profile">
      </div>
      <label for="imgUpload" class="avatar-edit">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </label>
      <input type="file" id="imgUpload" accept="image/*">
    </div>
    <div class="profile-info">
      <div class="profile-badge">Member</div>
      <div class="profile-name" id="uname">—</div>
      <div class="profile-details">
        <div class="profile-detail">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span id="uemail">—</span>
        </div>
        <div class="profile-detail">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <span id="uphone">—</span>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn-ghost">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Edit Profile
        </button>
        <button class="btn-danger" onclick="logout()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign Out
        </button>
      </div>
    </div>
  </div>

  <!-- Info cards -->
  <div class="section-title">Account Details</div>
  <div class="info-grid">
    <div class="info-card">
      <div class="info-label">Username</div>
      <div class="info-value" id="iUsername">—</div>
    </div>
    <div class="info-card">
      <div class="info-label">Email Address</div>
      <div class="info-value" id="iEmail">—</div>
    </div>
    <div class="info-card">
      <div class="info-label">Phone Number</div>
      <div class="info-value" id="iPhone">—</div>
    </div>
    <div class="info-card">
      <div class="info-label">Member Since</div>
      <div class="info-value">2025</div>
    </div>
  </div>

  <!-- Activity -->
  <div class="section-title">Recent Activity</div>
  <div class="activity-grid">
    <div class="activity-card"></div>
    <div class="activity-card"></div>
    <div class="activity-card"></div>
    <div class="activity-card"></div>
    <div class="activity-card"></div>
    <div class="activity-card"></div>
  </div>

</div>

<script>
  const u=localStorage.getItem('username')||'—';
  const e=localStorage.getItem('email')||'—';
  const p=localStorage.getItem('phone')||'—';

  document.getElementById('uname').textContent=u;
  document.getElementById('uemail').textContent=e;
  document.getElementById('uphone').textContent=p;
  document.getElementById('iUsername').textContent=u;
  document.getElementById('iEmail').textContent=e;
  document.getElementById('iPhone').textContent=p;

  // Set avatar initials URL
  const img=document.getElementById('profileImg');
  const saved=localStorage.getItem('profileImage');
  if(saved) img.src=saved;
  else img.src=`https://ui-avatars.com/api/?background=1f1f26&color=7a7a8c&size=110&name=${u[0]||'U'}&bold=true`;

  // Upload photo
  document.getElementById('imgUpload').addEventListener('change',function(){
    const file=this.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const i=new Image();
      i.src=ev.target.result;
      i.onload=function(){
        const c=document.createElement('canvas');
        c.width=c.height=150;
        c.getContext('2d').drawImage(i,0,0,150,150);
        const d=c.toDataURL('image/jpeg',0.75);
        img.src=d;
        localStorage.setItem('profileImage',d);
      };
    };
    reader.readAsDataURL(file);
  });

  function logout(){
    localStorage.clear();
    navigateTo('login.html');
  }

  // Page navigation with fade transition
  function navigateTo(page) {
    const loader = document.getElementById('loaderOverlay');
    loader.classList.add('active');
    document.body.style.animation='fadeOut 0.4s ease forwards';
    setTimeout(() => { window.location.href=page; }, 400);
  }
  
  // Add fade out animation
  const style=document.createElement('style');
  style.textContent=`@keyframes fadeOut{to{opacity:0;}}`;
  document.head.appendChild(style);
  
  // Fade in on load
  document.body.style.opacity='0';
  window.addEventListener('load',()=>{
    document.body.style.transition='opacity 0.4s ease';
    document.body.style.opacity='1';
  });
</script>
</body>
</html>
