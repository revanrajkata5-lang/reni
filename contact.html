<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    cursor: pointer;
    color: black;
    background: transparent;
}

.close-btn:hover {
    color: var(--accent);
}

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color:  #0ed8f3;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(1rem, 5vw, 2rem);
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(1rem, 5vh, 2rem);
            max-width: 600px;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: clamp(0.75rem, 3vw, 1.5rem);
            width: 100%;
        }

        label {
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }

        input, textarea {
            padding: clamp(0.5rem, 2vw, 1rem);
            border-radius: 8px;
            border: 2px solid var(--neutral);
        }
        .card {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white;
            cursor: pointer;
        }
    button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background-color: #00c6ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #00a6d6;
}

    </style>
</head>
<body>
    <header>
        <div class="close-btn" onclick="goHome()">✖</div>
    </header>

    <main>
        <section class="card">
            <h2>Contact Us</h2>
            <p>If you have any questions or feedback, feel free to reach out to us!</p>
            <form id="contact-form">
    <label>NAME:</label>
    <input type="text" name="user_name" required>

    <label>EMAIL:</label>
    <input type="email" name="user_email" required>

    <label>MESSAGE:</label>
    <textarea name="message" rows="8" required></textarea>

    <button type="submit">SEND MESSAGE</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("4QUJ28g0GILgRc1VY");

document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm("service_lu57i9l", "template_gup6jd9", this)
    .then(() => {
        alert("Message sent successfully!");
        this.reset(); // clears form
    })
    .catch(() => {
        alert("Failed to send message");
    });
});
</script>
        </section>
    </main>

    <script>
        function goHome() {
            window.location.href = "main.html";
        }
    </script>
</body>
</html>
