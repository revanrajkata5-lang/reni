 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
       .close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 22px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

.close-btn:hover {
    color: #00c6ff;
    transform: scale(1.2);
}
body {
    margin: 0;
    font-family: 'Inter', sans-serif;

    background: radial-gradient(circle at top, #141414, #0b0b0f, #000);
    color: white;

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1rem, 5vw, 2rem);
}
* {
    transition: all 0.25s ease;
}
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(1rem, 5vh, 2rem);
            max-width: 600px;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: clamp(0.75rem, 3vw, 1.5rem);
            width: 100%;
        }

        label {
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }

        input, textarea {
            padding: clamp(0.5rem, 2vw, 1rem);
            border-radius: 8px;
            border: 2px solid var(--neutral);
        }
        .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 2rem;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    color: white;

    box-shadow: 0 0 40px rgba(0,198,255,0.2);
    border: 1px solid rgba(255,255,255,0.08);

    transition: 0.3s ease;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 60px rgba(0,198,255,0.4);
}
   button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 30px rgba(0,198,255,0.5);
}

.bg-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,198,255,0.25), transparent);
    top: -100px;
    left: -100px;
    filter: blur(120px);
    animation: moveGlow 12s infinite alternate;
}

@keyframes moveGlow {
    0% { top: -100px; left: -100px; }
    100% { top: 150px; left: 250px; }
}
input, textarea {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(0,0,0,0.6);
    color: white;
}

input:focus, textarea:focus {
    box-shadow: 0 0 10px #00c6ff;
}
.success-box {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);

    display: flex;
    align-items: center;
    justify-content: center;

    opacity: 0;
    pointer-events: none;
    transition: 0.4s ease;
    z-index: 999;
}

.success-box.active {
    opacity: 1;
    pointer-events: all;
}

.success-content {
    background: rgba(255,255,255,0.05);
    padding: 2rem 3rem;
    border-radius: 20px;
    text-align: center;
    color: white;

    box-shadow: 0 0 40px rgba(0,198,255,0.3);
    border: 1px solid rgba(255,255,255,0.1);

    transform: scale(0.8);
    animation: popIn 0.4s forwards;
}

@keyframes popIn {
    to {
        transform: scale(1);
    }
}

/* ✔ check animation */
.checkmark {
    font-size: 40px;
    color: #00c6ff;
    margin-bottom: 10px;
    animation: glowCheck 1s infinite alternate;
}

@keyframes glowCheck {
    from { text-shadow: 0 0 5px #00c6ff; }
    to { text-shadow: 0 0 20px #00c6ff; }
}
    </style>
</head>
<body>
    <div id="successBox" class="success-box">
    <div class="success-content">
        <div class="checkmark">✔</div>
        <h2>Message Sent</h2>
        <p>We’ll get back to you soon.</p>
    </div>
</div>
    <div class="bg-glow"></div>
    <header>
        <div class="close-btn" onclick="goHome()">✖</div>
    </header>

    <main>
        <section class="card">
            <h2>Contact Us</h2>
            <p>If you have any questions or feedback, feel free to reach out to us!</p>
            <form id="contact-form">
    <label>NAME:</label>
    <input type="text" name="user_name" required>

    <label>EMAIL:</label>
    <input type="email" name="user_email" required>

    <label>MESSAGE:</label>
    <textarea name="message" rows="8" required></textarea>

    <button type="submit">SEND MESSAGE</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("4QUJ28g0GILgRc1VY");
document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = this;

    // store values BEFORE reset
    const userName = form.user_name.value;
    const userEmail = form.user_email.value;
    const message = form.message.value;

    // show success UI
    document.getElementById("successBox").classList.add("active");

    setTimeout(() => {
        document.getElementById("successBox").classList.remove("active");
    }, 2500);

    // send emails
    emailjs.sendForm("service_lu57i9l", "template_gup6jd9", form)
    .then(() => {
        return emailjs.send("service_lu57i9l", "template_w0bri0j", {
            user_name: userName,
            user_email: userEmail,
            message: message
        });
    })
    .then(() => {
        form.reset(); // ✅ reset AFTER sending
    })
    .catch((error) => {
        console.log("Email error:", error);
    });
});

</script>
        </section>
    </main>

    <script>
        function goHome() {
            window.location.href = "main.html";
        }
    </script>
    <script>
// Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

// Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }
});
</script>
</body>
</html>
