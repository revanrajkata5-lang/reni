<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — RENI NOW</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --black:#060608;--surface:#0f0f12;--surface-2:#17171c;
      --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.14);
      --text:#f0f0f2;--text-muted:#7a7a8c;
      --accent:#e8c97a;--accent-dim:rgba(232,201,122,0.1);
      --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:var(--font-body);background:var(--black);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;-webkit-font-smoothing:antialiased;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size:80px 80px;pointer-events:none;
    }

    .close{
      position:fixed;top:20px;right:20px;
      width:36px;height:36px;border-radius:7px;
      background:var(--surface-2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      color:var(--text-muted);cursor:pointer;
      transition:color 0.2s,border-color 0.2s;z-index:10;
    }
    .close:hover{color:var(--text);border-color:var(--border-hover);}

    .card{
      position:relative;z-index:1;
      width:100%;max-width:460px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;padding:clamp(32px,5vw,48px);
      animation:rise 0.6s ease forwards;opacity:0;
    }
    @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    /* Loader Styles */
    .loader-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#060608,#1a1a2e);
      display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;
      pointer-events:none;transition:opacity 0.3s ease;
    }
    .loader-overlay.active{opacity:1;pointer-events:all;}
    .loader-container{
      background:linear-gradient(135deg,rgba(232,201,122,0.1),rgba(74,144,226,0.1));
      border:2px solid rgba(232,201,122,0.3);border-radius:20px;padding:60px 80px;
    }
    .loader{
      display:flex;gap:12px;--ANIMATION-DELAY-MULTIPLIER:70ms;
    }
    .letter{
      display:inline-flex;align-items:center;justify-content:center;color:#e8c97a;
      animation:hideAndSeek 0.8s ease-in-out infinite;
    }
    .letter.l{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 0);}
    .letter.o{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 1);}
    .letter.a{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 2);}
    .letter.d{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 3);}
    .letter.i{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 4);}
    .letter.n{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 5);}
    .letter.g{animation-delay:calc(var(--ANIMATION-DELAY-MULTIPLIER) * 6);}
    @keyframes hideAndSeek{
      0%,100%{transform:translateY(2rem);}
      50%{transform:translateY(-0.5rem);}
    }

    .eyebrow{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
    h1{font-family:var(--font-display);font-size:44px;letter-spacing:0.04em;line-height:1;margin-bottom:4px;}
    h1 span{color:var(--accent);}
    .subtitle{font-size:13px;color:var(--text-muted);margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);}

    .field{margin-bottom:20px;}
    label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px;font-weight:500;}
    input,textarea{
      width:100%;background:var(--surface-2);border:1px solid var(--border);
      border-radius:8px;padding:12px 15px;font-size:14px;color:var(--text);
      font-family:var(--font-body);outline:none;resize:vertical;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
    input::placeholder,textarea::placeholder{color:var(--text-muted);}
    textarea{min-height:120px;}

    .btn{
      width:100%;padding:14px;margin-top:8px;border:none;border-radius:8px;
      background:var(--accent);color:#000;
      font-family:var(--font-display);font-size:18px;letter-spacing:0.08em;
      cursor:pointer;transition:opacity 0.2s,transform 0.2s;
    }
    .btn:hover{opacity:0.9;transform:translateY(-1px);}

    /* Success overlay */
    .success-overlay{
      position:fixed;inset:0;
      background:rgba(6,6,8,0.85);backdrop-filter:blur(10px);
      display:flex;align-items:center;justify-content:center;
      z-index:999;opacity:0;pointer-events:none;
      transition:opacity 0.3s;
    }
    .success-overlay.active{opacity:1;pointer-events:all;}
    .success-box{
      background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:40px 48px;text-align:center;
      transform:scale(0.92);transition:transform 0.3s;
    }
    .success-overlay.active .success-box{transform:scale(1);}
    .check{
      width:56px;height:56px;border-radius:50%;
      background:var(--accent-dim);border:1px solid rgba(232,201,122,0.3);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;color:var(--accent);
    }
    .success-title{font-family:var(--font-display);font-size:28px;letter-spacing:0.06em;margin-bottom:8px;}
    .success-sub{font-size:13px;color:var(--text-muted);}
  </style>
</head>
<body>

<!-- LOADER OVERLAY -->
<div id="loaderOverlay" class="loader-overlay">
  <div class="loader-container">
    <div class="loader">
      <span class="letter l">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <line x1="10" y1="5" x2="10" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <line x1="10" y1="55" x2="25" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="letter o">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <circle cx="20" cy="30" r="15" stroke="currentColor" stroke-width="3"/>
        </svg>
      </span>
      <span class="letter a">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <path d="M 25 50 Q 20 30 15 25 Q 10 20 5 25 L 5 50" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="8" y1="35" x2="22" y2="35" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="letter d">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <line x1="25" y1="5" x2="25" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M 25 10 Q 10 10 10 30 Q 10 50 25 50" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="letter i">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <circle cx="20" cy="12" r="2.5" fill="currentColor"/>
          <line x1="20" y1="20" x2="20" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="letter n">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <line x1="10" y1="50" x2="10" y2="20" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M 10 25 Q 10 15 20 15 Q 30 15 30 25 L 30 50" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="letter g">
        <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
          <path d="M 25 15 Q 10 15 10 30 Q 10 45 25 45 L 25 50 Q 10 50 8 60" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </div>
</div>

<div class="close" onclick="navigateTo('main.html')">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="check">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">MESSAGE SENT</div>
    <div class="success-sub">We will get back to you soon.</div>
  </div>
</div>

<div class="card">
  <div class="eyebrow">Support</div>
  <h1>GET IN<br><span>TOUCH</span></h1>
  <div class="subtitle">Questions or feedback? We read everything.</div>

  <form id="contactForm">
    <div class="field">
      <label for="uname">Name</label>
      <input type="text" id="uname" name="user_name" placeholder="Your name" required>
    </div>
    <div class="field">
      <label for="uemail">Email</label>
      <input type="email" id="uemail" name="user_email" placeholder="your@email.com" required>
    </div>
    <div class="field">
      <label for="umsg">Message</label>
      <textarea id="umsg" name="message" placeholder="What's on your mind?" required></textarea>
    </div>
    <button type="submit" class="btn">Send Message</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  emailjs.init("4QUJ28g0GILgRc1VY");

  document.getElementById('contactForm').addEventListener('submit',function(e){
    e.preventDefault();
    const form=this;
    const uname=form.user_name.value;
    const uemail=form.user_email.value;
    const msg=form.message.value;

    document.getElementById('successOverlay').classList.add('active');
    setTimeout(()=>document.getElementById('successOverlay').classList.remove('active'),2500);

    emailjs.sendForm("service_lu57i9l","template_gup6jd9",form)
      .then(()=>emailjs.send("service_lu57i9l","template_w0bri0j",{user_name:uname,user_email:uemail,message:msg}))
      .then(()=>form.reset())
      .catch(err=>console.log(err));
  });

  // Page navigation with fade transition
  function navigateTo(page) {
    const loader = document.getElementById('loaderOverlay');
    loader.classList.add('active');
    document.body.style.animation='fadeOut 0.4s ease forwards';
    setTimeout(() => { window.location.href=page; }, 400);
  }
  
  // Add fade out animation
  const style=document.createElement('style');
  style.textContent=`@keyframes fadeOut{to{opacity:0;}}`;
  document.head.appendChild(style);
  
  // Fade in on load
  document.body.style.opacity='0';
  window.addEventListener('load',()=>{
    document.body.style.transition='opacity 0.4s ease';
    document.body.style.opacity='1';
  });
</script>
</body>
</html>
