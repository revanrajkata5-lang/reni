<!DOCTYPE html>
<html lang="en">

<head>
    <title>Account Info - RENI STUDIO'S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-primary: oklch(5% 0 0);
            --bg-secondary: oklch(95% 0 0);
            --text-primary: oklch(10% 0 0);
            --text-secondary: oklch(90% 0 0);
            --accent: oklch(60% 0.2 240);
            --neutral: oklch(80% 0.05 0);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 5vw, 2rem);
        }

        main {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .empty-state {
            background-color: var(--bg-secondary);
            padding: clamp(2rem, 5vw, 3rem);
            border-radius: 12px;
            box-shadow: 0 4px 12px oklch(0% 0 0 / 0.1);
        }

        .empty-state p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin: 0 0 1.5rem 0;
            color: var(--text-primary);
        }

        .cta-button {
            display: inline-block;
            padding: clamp(0.75rem, 3vw, 1rem) clamp(1.5rem, 6vw, 2rem);
            font-size: clamp(1rem, 4vw, 1.1rem);
            font-weight: 600;
            color: var(--bg-primary);
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease-out-quart;
            box-shadow: 0 4px 16px oklch(60% 0.2 240 / 0.3);
        }

        .cta-button:hover, .cta-button:focus {
            background-color: oklch(70% 0.25 240);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px oklch(60% 0.2 240 / 0.4);
        }

        .cta-button:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            .cta-button {
                transition: none;
            }
            .cta-button:hover {
                transform: none;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: oklch(10% 0 0);
                --bg-secondary: oklch(20% 0 0);
                --text-primary: oklch(90% 0 0);
                --text-secondary: oklch(95% 0 0);
            }
        }
    </style>
</head>

<body>
    <main>
        <h1>Account Information</h1>
        <div class="empty-state">
            <p>This feature is currently under development. We're working to bring you a comprehensive account management experience.</p>
            <a href="main interface.html" class="cta-button">Return to Main Interface</a>
        </div>
    </main>
</body>

</html>
