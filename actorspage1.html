<!DOCTYPE html>
<html lang="en">    
<head>
    <title>Actors - RENI STUDIO'S</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;

            /* 🎬 Cinematic background */
            background: radial-gradient(circle at top, #141414, #0b0b0f, #000);
            color: whitesmoke;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* ✨ Moving glow */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,198,255,0.25), transparent);
            top: -100px;
            left: -100px;
            filter: blur(120px);
            animation: moveGlow 12s infinite alternate;
        }

        @keyframes moveGlow {
            0% { top: -100px; left: -100px; }
            100% { top: 150px; left: 250px; }
        }

        main {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }

        header img {
            display: block;
            margin: 0 auto 20px;
            width: 420px;
            height: 170px;

            /* subtle hover zoom */
            transition: 0.4s;
        }

        header img:hover {
            transform: scale(1.05);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            margin-bottom: 30px;
            letter-spacing: 2px;

            /* gradient text */
            background: linear-gradient(90deg, #00c6ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Button Container */
        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Buttons */
        .option-btn {
            padding: 20px;
            font-size: 18px;
            border-radius: 15px;
            border: none;
            cursor: pointer;

            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);

            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 🔥 Hover Glow Effect */
        .option-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,198,255,0.5);
        }

        /* ✨ Shine animation */
        .option-btn::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.2),
                transparent
            );
            transform: rotate(25deg);
            opacity: 0;
        }

        .option-btn:hover::before {
            opacity: 1;
            animation: shine 0.6s forwards;
        }

        @keyframes shine {
            from { transform: translateX(-100%) rotate(25deg); }
            to { transform: translateX(100%) rotate(25deg); }
        }

        /* Active / Selected */
        .option-btn.active {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0,198,255,0.8);
        }

        .left-section {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 22px;
            gap: clamp(0.5rem, 2vw, 1rem);
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;

            width: 44px;
            height: 44px;
            border-radius: 50%;

            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);

            color: white;
            text-decoration: none;
            font-size: 18px;

            transition: 0.3s;
        }

        .back-btn:hover {
            background: #00c6ff;
            color: black;
            transform: translateX(-3px) scale(1.1);
            box-shadow: 0 0 20px #00c6ff;
        }

        /* smooth transitions globally */
        * {
            transition: all 0.25s ease;
        }
    </style>
</head>

<body>

<div class="bg-glow"></div>

<main>
    <header>
        <img src="renibg_img.png" alt="logo" width="220">
        <h1>ACTORS 🎬</h1>

        <div class="left-section">
            <a href="main.html" class="back-btn" aria-label="Back to main">←</a>
        </div>
    </header>

    <div class="options">
        <button class="option-btn" onclick="goToPage('actorslong.html', this)">LONG VIDEOS</button>
        <button class="option-btn" onclick="goToPage('actorsshort.html', this)">SHORT VIDEOS</button>
    </div>
</main>

<script>
function goToPage(page, btn) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    setTimeout(() => {
        window.location.href = page;
    }, 300);
}
</script>

</body>
</html>
