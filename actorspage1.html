<!DOCTYPE html>
<html lang="en">    
<head>
    <title>Actors - RENI STUDIO'S</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: black;
            color: whitesmoke;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        main {
            width: 100%;
            max-width: 500px;
        }

        header img {
            display: block;
            margin: 0 auto 20px;
            width: 420px;
            height: 170px;
        }

        h1 {
            font-family: olive village, serif;
            font-size: 50px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Button Container */
        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Buttons */
        .option-btn {
            padding: 20px;
            font-size: 18px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background: rgb(85, 193, 239);
            color: whitesmoke;
            border: 1px solid whitesmoke;
        }

        /* Hover Effect */
        .option-btn:hover {
            transform: scale(1.05);
            background: rgba(0, 198, 255, 0.3);
        }

        /* Active / Selected */
        .option-btn.active {
            background: #00c6ff;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,198,255,0.7);
        }
    </style>
</head>

<body>
    <main>
        <header>
            <img src="renibg_img.png" alt="logo" width="220">
            <h1>ACTORS🎬</h1>
        </header>

        <div class="options">
           <button class="option-btn" onclick="goToPage('actorslong.html', this)">LONG VIDEOS</button>
<button class="option-btn" onclick="goToPage('actorsshort.html', this)">SHORT VIDEOS</button>
        </div>
    </main>

   <script>
    function goToPage(page, btn) {
        // highlight selected button
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // small delay for animation effect
        setTimeout(() => {
            window.location.href = page;
        }, 300);
    }
</script>
</body>
</html>
